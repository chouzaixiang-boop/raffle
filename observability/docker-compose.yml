services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: raffle-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: raffle-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: raffle-mysql-exporter
    restart: unless-stopped
    ports:
      - "9104:9104"
    environment:
      - DATA_SOURCE_NAME=root:123456@(192.168.80.128:13306)/

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: raffle-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    command:
      - --redis.addr=redis://192.168.80.128:16379
      - --redis.password=
