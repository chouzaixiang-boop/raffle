spring.application.name=raffle
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:192.168.80.128}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:raffle_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- ????? HikariCP ????? ---
# ????????????????
spring.datasource.hikari.minimum-idle=5
# ?????????????????
spring.datasource.hikari.maximum-pool-size=60
# ????????????????????????????????
spring.datasource.hikari.connection-timeout=30000
# ????????
spring.datasource.hikari.max-lifetime=1800000
# ????????
spring.datasource.hikari.idle-timeout=600000
# ----------------------------------------

spring.data.redis.host=${REDIS_HOST:192.168.80.128}
spring.data.redis.port=${REDIS_PORT:16379}
spring.data.redis.database=${REDIS_DATABASE:4}

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.type-aliases-package=org.example.raffle.domain

raffle.cache.refresh-interval-ms=300000
raffle.stock.writeback.interval-ms=5000

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.raffle.persist.record.duration=true
management.metrics.enable.hikaricp=true

logging.file.name=${LOG_FILE:logs/raffle-app.log}

server.port=${SERVER_PORT:8080}

# --- Actuator & Prometheus ---
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
management.metrics.enable.hikaricp=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
